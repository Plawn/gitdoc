services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gitdoc
      POSTGRES_USER: gitdoc
      POSTGRES_PASSWORD: gitdoc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitdoc"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
