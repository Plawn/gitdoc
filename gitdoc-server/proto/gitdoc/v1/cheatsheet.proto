syntax = "proto3";

package gitdoc.v1;

import "gitdoc/v1/common.proto";

service CheatsheetService {
  rpc GetCheatsheet (GetCheatsheetRequest) returns (GetCheatsheetResponse);
  rpc GenerateCheatsheet (GenerateCheatsheetRequest) returns (GenerateCheatsheetResponse);
  rpc ListPatches (ListPatchesRequest) returns (ListPatchesResponse);
  rpc GetPatch (GetPatchRequest) returns (GetPatchResponse);
}

message GetCheatsheetRequest {
  string repo_id = 1;
}

message GetCheatsheetResponse {
  string repo_id = 1;
  string content = 2;
  string model = 3;
  string updated_at = 4;
}

message GenerateCheatsheetRequest {
  string repo_id = 1;
  int64 snapshot_id = 2;
  string trigger = 3;
}

message GenerateCheatsheetResponse {
  string repo_id = 1;
  int64 patch_id = 2;
  string content = 3;
  string model = 4;
  string updated_at = 5;
}

message ListPatchesRequest {
  string repo_id = 1;
  int64 limit = 2;
  int64 offset = 3;
}

message ListPatchesResponse {
  repeated CheatsheetPatchMeta patches = 1;
  int64 total = 2;
}

message GetPatchRequest {
  string repo_id = 1;
  int64 patch_id = 2;
}

message GetPatchResponse {
  CheatsheetPatchRow patch = 1;
}
