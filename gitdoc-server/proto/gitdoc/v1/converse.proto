syntax = "proto3";

package gitdoc.v1;

import "gitdoc/v1/common.proto";

service ConverseService {
  rpc Converse (ConverseRequest) returns (ConverseResponse);
  rpc ResetConversation (ResetConversationRequest) returns (ResetConversationResponse);
}

message ConverseRequest {
  int64 snapshot_id = 1;
  string q = 2;
  int64 conversation_id = 3;
  uint64 limit = 4;
  string detail_level = 5;
}

message ConverseResponse {
  int64 conversation_id = 1;
  string answer = 2;
  repeated SourceRef sources = 3;
  int32 turn_index = 4;
}

message ResetConversationRequest {
  int64 snapshot_id = 1;
  int64 conversation_id = 2;
}

message ResetConversationResponse {
  bool deleted = 1;
}
